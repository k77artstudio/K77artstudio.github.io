<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Special Message</title>

<style>
  body {
    margin: 0;
    padding: 0;
    background: black;
    color: white;
    font-family: Arial, sans-serif;
    text-align: center;
  }

  .container {
    padding: 40px 20px;
  }

  /* 🔴 LOGO STYLE */
  .logo {
    width: 120px;
    margin-bottom: 20px;
  }

  h1 {
    font-size: 28px;
    margin-bottom: 20px;
  }

  p {
    font-size: 18px;
    margin-top: 30px;
    line-height: 1.6;
  }

  button {
    margin-top: 30px;
    padding: 12px 20px;
    font-size: 16px;
    border: none;
    background: white;
    color: black;
    cursor: pointer;
  }

  audio {
    margin-top: 20px;
    width: 90%;
  }
</style>
</head>

<body>

<div class="container">

  <!-- 🔴 ADD YOUR LOGO HERE -->
  <img src="https://i.ibb.co/JRLgxb7g/file-000000004a20720a92ce1c3feb2a2838.png" class="logo">

  <!-- 🔴 CHANGE CLIENT NAME HERE -->
  <h1>Listen to Your Special Message, Mr. Owen</h1>

  <!-- 🔴 START BUTTON -->
  <button onclick="startExperience()">Tap to Begin</button>

  <!-- 🔴 VOICE MESSAGE -->
  <audio id="voiceMessage" controls>
    <source src="https://files.catbox.moe/g65in2.mp3" type="audio/mpeg">
  </audio>

  <!-- 🔴 MESSAGE TEXT -->
  <p>
    I am because you are,<br>
    yours, Kindred Spirit.
  </p>

</div>

<!-- 🔴 BACKGROUND MUSIC -->
<audio id="bgMusic" loop>
  <source src=”https://files.catbox.moe/wwc3eu.mp3" type="audio/mpeg">
</audio>

<script>
function startExperience() {
  const bg = document.getElementById("bgMusic");
  bg.volume = 0.2;
  bg.play();
}

// Lower music when voice plays
const bg = document.getElementById("bgMusic");
const voice = document.getElementById("voiceMessage");

voice.onplay = () => bg.volume = 0.1;
voice.onpause = () => bg.volume = 0.2;
</script>

</body>
</html>
