<!DOCTYPE html>
<html>
<head>

<!-- THIS FIXES THE “TINY PAGE” ISSUE -->
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

/* BACKGROUND */
body {
  background-color: #000;
  color: #fff;
  font-family: Arial, sans-serif;
  margin: 0;
}

/* REMOVE WIDTH LIMIT */
.container {
  width: 100%;
  padding: 40px 20px;
  box-sizing: border-box;
}

/* LOGO (BIG AGAIN) */
.logo {
  display: block;
  margin: 0 auto 35px;
  width: 180px;
}

/* TITLE (BOLD + CLEAR) */
h1 {
  margin-bottom: 30px;
  font-size: 26px;
  text-align: center;
  color: #d4af37;
}

/* SUBTEXT */
.highlight {
  margin-bottom: 30px;
  text-align: center;
  font-size: 18px;
  color: #ccc;
}

/* AUDIO */
audio {
  width: 100%;
  margin: 30px 0;
  filter: invert(1);
}

/* ARTWORK */
.art-frame {
  width: 100%;
  margin: 35px 0;
  border: 3px solid #d4af37;
  padding: 6px;
  background-color: #000;
}

/* GRATITUDE */
.gratitude {
  margin-top: 40px;
  font-size: 18px;
  line-height: 1.8;
  text-align: center;
}

/* INSTAGRAM */
.ig-link {
  display: block;
  text-align: center;
  margin-top: 25px;
  font-size: 16px;
  color: #d4af37;
  text-decoration: none;
}

/* WHATSAPP */
.whatsapp {
  text-align: center;
  margin-top: 15px;
  font-size: 18px;
  font-weight: bold;
}

</style>
</head>

<body>
<div class="container">

  <!-- LOGO -->
  <img src="https://files.catbox.moe/sqylip.png" class="logo">

  <!-- TITLE -->
  <h1>
    Every piece carries a story, this one is yours.<br>
    Victor — 2026 🌹
  </h1>

  <!-- SUBTEXT -->
  <p class="highlight">
    This piece speaks. Listen.
  </p>

  <!-- AUDIO -->
  <audio controls>
    <source src="https://files.catbox.moe/wwc3eu.mp3" type="audio/mpeg">
  </audio>

  <!-- ARTWORK -->
  <img src="https://files.catbox.moe/orbh8s.png" class="art-frame">

  <!-- GRATITUDE -->
  <p class="gratitude">
    Thank you for being part of this story.<br>
    I’m because you are.<br><br>
    — Kindred Spirit
  </p>

  <!-- INSTAGRAM -->
  <a href="PASTE-INSTAGRAM-LINK-HERE" target="_blank" class="ig-link">
    Contact us on Instagram
  </a>

  <!-- WHATSAPP -->
  <p class="whatsapp">
    WhatsApp: 09014501664
  </p>

</div>
</body>
</html>
