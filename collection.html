<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>K77 Gallery</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #f8f6f2;
}

/* HERO */
.hero {
  height: 60vh;
  background: url("https://images.unsplash.com/photo-1577083552792-3d1f5c4e4c3f") center/cover no-repeat;
  display: flex;
  align-items: center;
  justify-content: center;
}

.hero h1 {
  background: rgba(0,0,0,0.5);
  color: white;
  padding: 15px 25px;
  font-size: 24px;
}

/* CONTAINER */
.container {
  max-width: 900px;
  margin: auto;
  padding: 40px 20px;
}

/* ART */
.art {
  margin-bottom: 60px;
  text-align: center;
}

.art img {
  width: 90%;
  max-width: 400px;
  border-radius: 8px;
  display: block;
  margin: auto;

  box-shadow: 0 20px 40px rgba(0,0,0,0.25),
              0 0 0 10px white,
              0 0 0 12px #ddd;
}

/* TEXT */
.title {
  margin-top: 20px;
  font-size: 18px;
}

.desc {
  color: #555;
  margin: 10px 0;
}

.price {
  color: #b8962e;
  margin-bottom: 15px;
}

/* BUTTON */
.btn {
  text-decoration: none;
  border: 1px solid #b8962e;
  color: #b8962e;
  padding: 10px 18px;
  border-radius: 5px;
}
</style>

</head>
<body>

<div class="hero">
  <h1>Signature Living Art Collection</h1>
</div>

<div class="container">

<div class="art">
  <img src="https://i.ibb.co/your-image.jpg">
  <div class="title">Untitled I</div>
  <div class="desc">A quiet expression of identity.</div>
  <div class="price">₦170,000</div>
</div>

</div>

</body>
</html>
