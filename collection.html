<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>K77 Art Collection</title>

<style>
body {
  margin: 0;
  background: #f4f1ea;
  font-family: Arial, sans-serif;
  color: #111;
}

/* HEADER */
.header {
  text-align: center;
  padding: 70px 20px 40px;
}

.header h1 {
  font-size: 26px;
  margin-bottom: 10px;
}

.header p {
  color: #666;
  font-size: 14px;
}

/* GRID */
.gallery {
  display: grid;
  grid-template-columns: 1fr;
  gap: 80px;
  max-width: 900px;
  margin: auto;
  padding: 20px;
}

/* ART BLOCK */
.art {
  text-align: center;
}

/* IMAGE */
.art img {
  width: 100%;
  max-width: 420px;
  display: block;
  margin: auto;

  padding: 12px;
  background: white;
  border: 1px solid #ddd;

  box-shadow: 0 15px 40px rgba(0,0,0,0.2);
}

/* TEXT */
.title {
  margin-top: 20px;
  font-size: 18px;
}

.desc {
  margin: 10px 0;
  color: #555;
}

.price {
  color: #b8962e;
  margin-bottom: 15px;
}

/* BUTTON */
.btn {
  text-decoration: none;
  border: 1px solid #b8962e;
  color: #b8962e;
  padding: 10px 18px;
  border-radius: 5px;
}

/* DESKTOP */
@media(min-width: 700px) {
  .gallery {
    grid-template-columns: 1fr 1fr;
  }
}
</style>

</head>
<body>

<div class="header">
  <h1>Signature Living Art Collection</h1>
  <p>Each piece is created as a one-of-one expression.</p>
</div>

<div class="gallery">

<!-- ART 1 -->
<div class="art">
  <img src="https://i.ibb.co/your-image1.jpg">
  <div class="title">Untitled I</div>
  <div class="desc">A quiet expression of identity.</div>
  <div class="price">₦170,000</div>
  <a class="btn" href="https://wa.me/2349014501664?text=Interested%20in%20Untitled%20I">Enquire</a>
</div>

<!-- ART 2 -->
<div class="art">
  <img src="https://i.ibb.co/your-image2.jpg">
  <div class="title">Abstract Form</div>
  <div class="desc">Movement captured in still form.</div>
  <div class="price">₦150,000</div>
  <a class="btn" href="https://wa.me/2349014501664?text=Interested%20in%20Abstract%20Form">Enquire</a>
</div>

<!-- ART 3 -->
<div class="art">
  <img src="https://i.ibb.co/your-image3.jpg">
  <div class="title">Signature Piece</div>
  <div class="desc">A refined balance of story and intention.</div>
  <div class="price">₦200,000</div>
  <a class="btn" href="https://wa.me/2349014501664?text=Interested%20in%20Signature%20Piece">Enquire</a>
</div>

</div>

</body>
</html>
