<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>K77 Gallery</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #f3f1ec;
  color: #111;
}

/* HERO (Gallery Feel) */
.hero {
  height: 60vh;
  background: url('https://images.unsplash.com/photo-1544967882-2c6d76e0b7a4') center/cover no-repeat;
  display: flex;
  align-items: center;
  justify-content: center;
}

.hero h1 {
  background: rgba(0,0,0,0.5);
  color: white;
  padding: 15px 25px;
  font-size: 26px;
  letter-spacing: 1px;
}

/* CONTAINER */
.container {
  padding: 50px 20px;
  max-width: 1000px;
  margin: auto;
}

/* ART BLOCK */
.art {
  margin-bottom: 70px;
  text-align: center;
}

/* IMAGE (FRAMED LOOK) */
.art img {
  width: 90%;
  max-width: 450px;
  border-radius: 8px;
  display: block;
  margin: auto;

  box-shadow: 
    0 20px 40px rgba(0,0,0,0.25),
    0 0 0 12px white,
    0 0 0 14px #ddd;
}

/* TEXT */
.title {
  margin-top: 20px;
  font-size: 18px;
}

.desc {
  color: #555;
  margin: 10px 0;
}

.price {
  color: #b8962e;
  margin-bottom: 15px;
}

/* BUTTON */
.btn {
  text-decoration: none;
  border: 1px solid #b8962e;
  color: #b8962e;
  padding: 10px 18px;
  border-radius: 5px;
  display: inline-block;
}
</style>

</head>
<body>

<!-- HERO -->
<div class="hero">
  <h1>Signature Living Art Collection</h1>
</div>

<!-- COLLECTION -->
<div class="container">

<!-- ART 1 -->
<div class="art">
  <img src="PASTE_IMAGE_LINK_HERE">
  <div class="title">Untitled I</div>
  <div class="desc">A quiet expression of identity and presence.</div>
  <div class="price">₦170,000</div>

  <a class="btn"
     href="https://wa.me/2349014501664?text=Hello,%20I%20am%20interested%20in%20Untitled%20I">
     Enquire
  </a>
</div>

<!-- ART 2 -->
<div class="art">
  <img src="PASTE_IMAGE_LINK_HERE">
  <div class="title">Abstract Form</div>
  <div class="desc">Movement captured in still form.</div>
  <div class="price">₦150,000</div>

  <a class="btn"
     href="https://wa.me/2349014501664?text=Hello,%20I%20am%20interested%20in%20Abstract%20Form">
     Enquire
  </a>
</div>

</div>

</body>
</html>
