<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Collection — K77 Art Studio</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #f5f5f5;
  color: #111;
}

/* CONTAINER */
.container {
  max-width: 1100px;
  margin: auto;
  padding: 40px 20px;
}

/* TITLE */
h1 {
  text-align: center;
  margin-bottom: 40px;
  font-size: 28px;
  letter-spacing: 1px;
}

/* GRID */
.grid {
  display: grid;
  grid-template-columns: 1fr;
  gap: 30px;
}

/* CARD */
.card {
  background: white;
  border-radius: 12px;
  padding: 20px;
  text-align: center;

  box-shadow: 0 10px 25px rgba(0,0,0,0.08);
  transition: 0.3s;
}

.card:hover {
  transform: translateY(-5px);
}

/* IMAGE */
.card img {
  width: 100%;
  max-width: 400px;
  border-radius: 10px;
  margin-bottom: 15px;
}

/* TEXT */
.title {
  font-size: 18px;
  margin-bottom: 8px;
}

.desc {
  font-size: 14px;
  color: #555;
  margin-bottom: 10px;
}

.price {
  color: #b8962e;
  margin-bottom: 15px;
}

/* BUTTON */
.button {
  display: inline-block;
  padding: 10px 18px;
  border: 1px solid #b8962e;
  color: #b8962e;
  text-decoration: none;
  border-radius: 6px;
  font-size: 14px;
}

/* DESKTOP */
@media(min-width: 700px) {
  .grid {
    grid-template-columns: 1fr 1fr;
  }
}
</style>

</head>
<body>

<div class="container">

<h1>Collection</h1>

<div class="grid">

<!-- ART 1 -->
<div class="card">
  <a href="art1.html">
    <img src="PASTE_IMAGE_LINK_HERE">
  </a>

  <div class="title">Untitled I</div>

  <div class="desc">
    A quiet expression of identity and presence.
  </div>

  <div class="price">Original • ₦170,000</div>

  <a class="button"
     href="https://wa.me/2349014501664?text=Hello,%20I%20am%20interested%20in%20Untitled%20I">
     Enquire
  </a>
</div>

<!-- ART 2 -->
<div class="card">
  <a href="art2.html">
    <img src="PASTE_IMAGE_LINK_HERE">
  </a>

  <div class="title">Abstract Form</div>

  <div class="desc">
    Movement captured in still form.
  </div>

  <div class="price">Original • ₦150,000</div>

  <a class="button"
     href="https://wa.me/2349014501664?text=Hello,%20I%20am%20interested%20in%20Abstract%20Form">
     Enquire
  </a>
</div>

<!-- ART 3 -->
<div class="card">
  <a href="art3.html">
    <img src="PASTE_IMAGE_LINK_HERE">
  </a>

  <div class="title">Signature Piece</div>

  <div class="desc">
    A refined balance of story and intention.
  </div>

  <div class="price">Original • ₦200,000</div>

  <a class="button"
     href="https://wa.me/2349014501664?text=Hello,%20I%20am%20interested%20in%20Signature%20Piece">
     Enquire
  </a>
</div>

</div>

</div>

</body>
</html>
