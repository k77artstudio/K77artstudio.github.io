<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>K77 Art Studio</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  background: #000;
  color: #fff;
  font-family: Arial, sans-serif;
}

/* CENTER EVERYTHING */
.wrapper {
  max-width: 480px;
  margin: 0 auto;
  text-align: center;
  padding: 80px 20px;
}

/* LOGO */
.logo {
  width: 120px;
  margin-bottom: 40px;
}

/* TITLE */
h1 {
  font-family: 'Playfair Display', serif;
  font-size: 32px;
  margin-bottom: 10px;
}

/* SIGNATURE */
.signature {
  color: #d4af37;
  letter-spacing: 2px;
  margin-bottom: 40px;
}

/* LINE */
.line {
  width: 50%;
  height: 1px;
  background: rgba(212,175,55,0.25);
  margin: 40px auto;
}

/* DESCRIPTION */
.desc {
  line-height: 1.8;
  opacity: 0.85;
  margin-bottom: 10px;
}

/* IMAGE FRAME (CLEAN — NO GLITCHES) */
.frame {
  margin: 60px 0;
}

/* IMAGE */
.frame img {
  width: 100%;
  max-width: 360px;
  display: block;
  margin: 0 auto;
  border-radius: 2px;
}

/* BUTTON */
.btn {
  display: inline-block;
  padding: 14px 26px;
  background: #d4af37;
  color: #000;
  text-decoration: none;
  border-radius: 3px;
  font-weight: bold;
}

/* FOOTER */
.footer {
  margin-top: 80px;
  font-size: 12px;
  opacity: 0.5;
}
</style>
</head>

<body>

<div class="wrapper">

  <!-- LOGO -->
  <img src="https://files.catbox.moe/sqylip.png" class="logo">

  <!-- BRAND -->
  <h1>K77 Art Studio</h1>
  <div class="signature">Signature Living Frame</div>

  <div class="line"></div>

  <!-- DESCRIPTION -->
  <p class="desc">
    Where Tattoo, Technology and Art converge into a living experience.
    Each piece is crafted to hold identity, memory and presence beyond the frame.
  </p>

  <div class="line"></div>

  <!-- IMAGE -->
  <div class="frame">
    <img src="<a href="https://ibb.co/6R5MZd3z"><img src="https://i.ibb.co/PZ8LYS7K/file-000000008b14722f887aefbd3f0bcafc.png" alt="file-000000008b14722f887aefbd3f0bcafc" border="0"></a>">
  </div>

  <div class="line"></div>

  <!-- BUTTON -->
  <a href="collection.html" class="btn">
    View Collection
  </a>

  <!-- FOOTER -->
  <div class="footer">
    © 2026 K77 Art Studio
  </div>

</div>

</body>
</html>
