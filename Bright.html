<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>K77 — Collector Experience</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Josefin+Sans:wght@100;200;300;400&display=swap" rel="stylesheet">

<style>

:root {
  --gold:       #d4af37;
  --gold-light: #f0d060;
  --gold-dim:   #8a6f1e;
  --black:      #000000;
  --off-black:  #0a0a0a;
  --white:      #f5f0e8;
  --border:     rgba(212,175,55,0.18);
}

* { margin: 0; padding: 0; box-sizing: border-box; }
html { scroll-behavior: smooth; }

body {
  background: var(--black);
  color: var(--white);
  font-family: 'Josefin Sans', sans-serif;
  font-weight: 200;
  letter-spacing: 0.04em;
  overflow-x: hidden;
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(22px); }
  to   { opacity: 1; transform: translateY(0); }
}

@keyframes shimmer {
  0%   { background-position: -200% center; }
  100% { background-position:  200% center; }
}

/* REMOVED pulse animation influence — replaced with calm glow only */
.logo {
  width: 108px;
  height: 108px;
  border-radius: 50%;
  object-fit: cover;
  display: block;
  margin: 0 auto;

  border: 1px solid rgba(212,175,55,0.14);

  /* subtle controlled glow (no pulsing, no expansion) */
  box-shadow: 0 0 10px rgba(212,175,55,0.10);
}

@keyframes blink {
  0%, 100% { opacity: 1; }
  50%       { opacity: 0.35; }
}

.f1 { animation: fadeUp 0.9s ease both 0.1s; }
.f2 { animation: fadeUp 0.9s ease both 0.3s; }
.f3 { animation: fadeUp 0.9s ease both 0.5s; }
.f4 { animation: fadeUp 0.9s ease both 0.7s; }
.f5 { animation: fadeUp 0.9s ease both 0.9s; }
.f6 { animation: fadeUp 0.9s ease both 1.1s; }

.container {
  max-width: 480px;
  margin: 0 auto;
  padding: 56px 24px 80px;
}

.top-rule {
  width: 1px; height: 56px;
  background: linear-gradient(to bottom, transparent, var(--gold));
  margin: 0 auto 40px;
}

.logo-wrap { text-align: center; margin-bottom: 42px; }

.studio-name {
  display: flex;
  align-items: baseline;
  justify-content: center;
  margin-top: 14px;
}

.studio-k {
  font-family: 'Cormorant Garamond', serif;
  font-weight: 400;
  font-style: italic;
  font-size: 22px;
  background: linear-gradient(90deg, #c8991a 0%, #f5d76e 40%, #ffe99a 50%, #f5d76e 60%, #c8991a 100%);
  background-size: 220% auto;
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  animation: shimmer 5s linear infinite;
}

.studio-77 {
  font-size: 13px;
  color: #ffffff;
  letter-spacing: 0.08em;
  margin-right: 5px;
}

.studio-rest {
  font-size: 9px;
  letter-spacing: 0.44em;
  text-transform: uppercase;
  background: linear-gradient(90deg, #c8991a 0%, #f5d76e 28%, #ffe99a 50%, #f5d76e 72%, #c8991a 100%);
  background-size: 220% auto;
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  animation: shimmer 5s linear infinite;
}

h1 {
  font-family: 'Cormorant Garamond', serif;
  font-weight: 300;
  font-style: italic;
  font-size: 26px;
  line-height: 1.65;
  text-align: center;
  color: var(--white);
}

.rose { font-size: 17px; display: block; margin-top: 10px; opacity: 0.6; }

.divider { display: flex; align-items: center; gap: 14px; margin: 30px 0; }
.dline { flex: 1; height: 1px; background: linear-gradient(to right, transparent, var(--border), transparent); }
.diamond { width: 6px; height: 6px; background: var(--gold); transform: rotate(45deg); opacity: 0.5; }

/* FIXED: brighter, readable gold (balanced not yellow) */
.sec-label {
  font-weight: 100;
  font-size: 8px;
  letter-spacing: 0.5em;
  text-transform: uppercase;
  color: #c7a23a;
  text-align: center;
  margin-bottom: 13px;
}

.audio-wrap {
  background: var(--off-black);
  border: 1px solid var(--border);
  border-radius: 3px;
  padding: 14px 16px;
}

audio { width: 100%; accent-color: var(--gold); }

.frame-outer {
  border: 1px solid var(--gold-dim);
  padding: 10px;
  background: #080808;
  position: relative;
  margin-top: 2px;
}

.corner { position: absolute; width: 14px; height: 14px; border-color: var(--gold); border-style: solid; opacity: 0.7; }
.tl { top: 4px; left: 4px; border-width: 1px 0 0 1px; }
.br { bottom: 4px; right: 4px; border-width: 0 1px 1px 0; }

.frame-inner { border: 1px solid #1a1a1a; overflow: hidden; }
.frame-inner video { width: 100%; display: block; }

.grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 1px;
  background: var(--border);
  border: 1px solid var(--border);
}

.cell { background: var(--off-black); padding: 16px 12px; text-align: center; }
.cell.full { grid-column: 1 / -1; }

.cell-label {
  font-size: 8px;
  letter-spacing: 0.42em;
  text-transform: uppercase;
  color: var(--gold-dim);
  margin-bottom: 8px;
}

.cell-value { font-family: 'Cormorant Garamond', serif; font-size: 16px; color: var(--white); }

.title-shimmer {
  background: linear-gradient(90deg, var(--gold-dim), var(--gold-light), var(--gold-dim));
  background-size: 200% auto;
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  animation: shimmer 4s linear infinite;
}

.collector-name {
  font-family: 'Cormorant Garamond', serif;
  font-size: 22px;
  font-style: italic;
  color: var(--gold);
}

.gratitude { text-align: center; padding: 8px 0; }

.sig {
  margin-top: 20px;
  font-size: 9px;
  letter-spacing: 0.42em;
  text-transform: uppercase;
  color: #d4af37;
}

.icons {
  display: flex;
  justify-content: center;
  gap: 24px;
}

.icon-a {
  width: 44px;
  height: 44px;
  border: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: center;
}

.bottom-rule {
  width: 1px;
  height: 40px;
  background: linear-gradient(to bottom, var(--gold-dim), transparent);
  margin: 0 auto;
}

</style>
</head>

<body>
<div class="container">

  <div class="logo-wrap f1">
    <img class="logo" src="https://files.catbox.moe/7wi9l9.png" alt="K77 Logo">
    <div class="studio-name">
      <span class="studio-k">K</span>
      <span class="studio-77">77</span>
      <span class="studio-rest">Art Studio</span>
    </div>
  </div>

  <h1 class="f2">
    Every piece carries a story.<br>
    This one found its collector.
    <span class="rose">🌹</span>
  </h1>

</div>
</body>
</html>
