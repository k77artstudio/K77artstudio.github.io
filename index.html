<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>K77 Art Studio</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: black;
    color: white;
}

/* SLIDER */
.slider {
    position: relative;
    height: 100vh;
    overflow: hidden;
}

.slide {
    position: absolute;
    width: 100%;
    height: 100%;
    background-size: contain; /* FIXED ZOOM */
    background-repeat: no-repeat;
    background-position: center;
    background-color: black;
    opacity: 0;
    transition: opacity 1.2s ease-in-out;
}

.slide.active {
    opacity: 1;
}

/* DARK OVERLAY */
.overlay-bg {
    position: absolute;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.6);
}

/* TEXT CONTENT */
.overlay {
    position: absolute;
    bottom: 60px;
    left: 40px;
    max-width: 500px;
}

h1 {
    color: gold;
    font-size: 42px;
    margin-bottom: 10px;
    letter-spacing: 2px;
}

.tagline {
    font-size: 16px;
    color: #ccc;
    line-height: 1.6;
}

.btn {
    margin-top: 20px;
    padding: 12px 26px;
    background: gold;
    color: black;
    text-decoration: none;
    display: inline-block;
    font-weight: bold;
    letter-spacing: 1px;
}
</style>
</head>

<body>

<div class="slider">
    <div class="slide active" style="background-image:url('<a href="https://ibb.co/ZRk2zXgw"><img src="https://i.ibb.co/CpTPK89X/IMG-20260404-WA0030.jpg" alt="IMG-20260404-WA0030" border="0"></a><br /><a target='_blank' href='https://imgbb.com/'>mobile image upload</a><br />1')"></div>
    <div class="slide" style="background-image:url('<a href="https://ibb.co/KcNdW3wz"><img src="https://i.ibb.co/nq39j5C8/Screenshot-20260403-180339.png" alt="Screenshot-20260403-180339" border="0"></a>2')"></div>
    <div class="slide" style="background-image:url('<a href="https://ibb.co/pv6LST5V"><img src="https://i.ibb.co/99mr70SK/IMG-20260404-WA0028.jpg" alt="IMG 20260404 WA0028" border="0"></a>3')"></div>

    <div class="overlay-bg"></div>

    <div class="overlay">
        <h1>K77 Art Studio</h1>
        <div class="tagline">
            Signature Living Frame — where memory, identity, and art exist beyond the canvas.
        </div>
        <a href="collection.html" class="btn">View Collection</a>
    </div>
</div>

<script>
let slides = document.querySelectorAll('.slide');
let index = 0;

setInterval(() => {
    slides[index].classList.remove('active');
    index = (index + 1) % slides.length;
    slides[index].classList.add('active');
}, 4000);
</script>

</body>
</html>
