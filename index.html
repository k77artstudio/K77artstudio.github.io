<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>K77 Art Studio</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  background: #000;
  color: white;
  font-family: Arial, sans-serif;
  display: flex;
  justify-content: center;
}

/* MAIN WRAPPER */
.wrapper {
  max-width: 500px;
  width: 100%;
  text-align: center;
  padding: 70px 20px;
}

/* LOGO */
.logo {
  width: 130px;
  margin-bottom: 40px;
}

/* TITLE */
h1 {
  font-family: 'Playfair Display', serif;
  font-size: 34px;
  margin-bottom: 10px;
}

/* SIGNATURE */
.signature {
  color: #d4af37;
  font-size: 18px;
  margin-bottom: 25px;
  letter-spacing: 2px;
}

/* DIVIDER LINE */
.line {
  width: 60%;
  height: 1px;
  background: rgba(212,175,55,0.3);
  margin: 40px auto;
}

/* DESCRIPTION */
.desc {
  line-height: 1.8;
  opacity: 0.85;
  padding: 0 10px;
}

/* IMAGE FRAME */
.frame {
  padding: 18px;
  background: #0a0a0a;
  border: 1px solid rgba(212,175,55,0.6);
  box-shadow: 0 25px 70px rgba(0,0,0,0.95);
  }
}

/* IMAGE */
.frame img {
  width: 100%;
  display: block;
}

/* BUTTON */
.btn {
  display: inline-block;
  padding: 14px 28px;
  background: #d4af37;
  color: black;
  text-decoration: none;
  border-radius: 4px;
  font-weight: bold;
}

/* FOOTER */
.footer {
  margin-top: 70px;
  font-size: 13px;
  opacity: 0.5;
}
</style>
</head>

<body>

<div class="wrapper">

  <!-- LOGO -->
  <img src="https://files.catbox.moe/sqylip.png" class="logo">

  <!-- BRAND -->
  <h1>K77 Art Studio</h1>
  <div class="signature">Signature Living Frame</div>

  <div class="line"></div>

  <!-- DESCRIPTION -->
  <p class="desc">
    Where Tattoo, Technology and Art converge into a living experience.
    Each piece is crafted to hold identity, memory and presence beyond the frame.
  </p>

  <div class="line"></div>

  <!-- ARTWORK -->
  <div class="frame">
    <img src="
<a href="https://ibb.co/6R5MZd3z"><img src="https://i.ibb.co/PZ8LYS7K/file-000000008b14722f887aefbd3f0bcafc.png" alt="file-000000008b14722f887aefbd3f0bcafc" border="0"></a>
">
  </div>

  <div class="line"></div>

  <!-- BUTTON -->
  <a href="collection.html" class="btn">
    View Collection
  </a>

  <!-- FOOTER -->
  <div class="footer">
    © 2026 K77 Art Studio
  </div>

</div>

</body>
</html>
