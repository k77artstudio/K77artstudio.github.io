<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Special Message</title>

<style>
  body {
    margin: 0;
    padding: 0;
    background: black;
    color: white;
    font-family: Arial, sans-serif;
    text-align: center;
  }

  .container {
    padding: 40px 20px;
  }

  h1 {
    font-size: 28px;
    margin-bottom: 20px;
  }

  p {
    font-size: 18px;
    margin-top: 30px;
    line-height: 1.6;
  }

  button {
    margin-top: 30px;
    padding: 12px 20px;
    font-size: 16px;
    border: none;
    background: white;
    color: black;
    cursor: pointer;
  }

  audio {
    margin-top: 20px;
    width: 90%;
  }
</style>
</head>

<body>

<div class="container">

  <!-- CHANGE NAME HERE -->
  <h1>Listen to Your Special Message, PUT NAME HERE</h1>

  <!-- START BUTTON -->
  <button onclick="startExperience()">Tap to Begin</button>

  <!-- VOICE MESSAGE -->
  <audio id="voiceMessage" controls>
    <source src="PASTE-YOUR-VOICE-LINK-HERE" type="audio/mpeg">
  </audio>

  <!-- MESSAGE -->
  <p>
    I am because you are,<br>
    yours, Kindred Spirit.
  </p>

</div>

<!-- BACKGROUND MUSIC -->
<audio id="bgMusic" loop>
  <source src="PASTE-YOUR-MUSIC-LINK-HERE" type="audio/mpeg">
</audio>

<script>
function startExperience() {
  const bg = document.getElementById("bgMusic");
  bg.volume = 0.2;
  bg.play();
}

const bg = document.getElementById("bgMusic");
const voice = document.getElementById("voiceMessage");

voice.onplay = () => bg.volume = 0.1;
voice.onpause = () => bg.volume = 0.2;
</script>

</body>
</html>
