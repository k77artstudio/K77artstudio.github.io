<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>K77 Art Studio - Living Frame</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Montserrat:wght@200;300;400;500;600&family=Dancing+Script:wght@600&display=swap" rel="stylesheet"/>
<style>
:root{
  --gold:#C9A84C;
  --gold-light:#E2C07A;
  --gold-dim:#8B6914;
  --black:#000000;
  --dark:#0A0A0A;
  --card:#0f0f0f;
  --border:#1E1E1E;
  --white:#ffffff;
  --cream:#F5F0E8;
  --green:#8A9A2E;
  --red:#e74c3c;
}
*{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{background:var(--black);color:var(--cream);font-family:'Montserrat',sans-serif;overflow-x:hidden;}
::-webkit-scrollbar{width:4px;}
::-webkit-scrollbar-track{background:var(--black);}
::-webkit-scrollbar-thumb{background:var(--gold-dim);}

/* ENTRANCE */
#entrance{
  position:fixed;inset:0;background:#000;z-index:99999;
  display:flex;flex-direction:column;align-items:center;
  justify-content:center;text-align:center;padding:24px;
  transition:opacity 1.2s ease,visibility 1.2s ease;
}
#entrance.gone{opacity:0;visibility:hidden;pointer-events:none;}
#ent-canvas{position:absolute;inset:0;width:100%;height:100%;}
.ent-content{position:relative;z-index:2;display:flex;flex-direction:column;align-items:center;}
.ent-logo{
  font-family:'Cormorant Garamond',serif;
  font-size:clamp(5rem,20vw,11rem);
  font-weight:300;line-height:0.88;color:#fff;
  opacity:0;animation:ef 1.8s ease 0.5s forwards;
}
.ent-logo span{color:#C9A84C;font-style:italic;}
.ent-sig{
  font-family:'Dancing Script',cursive;
  font-size:clamp(1.4rem,5vw,2.2rem);
  color:#E2C07A;margin-top:14px;
  opacity:0;animation:ef 1.8s ease 1.2s forwards;
}
.ent-line{width:50px;height:1px;background:#C9A84C;margin:28px auto;opacity:0;animation:ef 1.2s ease 1.8s forwards;}
.ent-tag{
  font-size:0.58rem;letter-spacing:0.45em;text-transform:uppercase;
  color:rgba(255,255,255,0.3);margin-bottom:48px;
  opacity:0;animation:ef 1.2s ease 2s forwards;
}
.ent-btn{
  padding:16px 48px;border:1px solid #C9A84C;
  background:transparent;color:#C9A84C;
  font-family:'Montserrat',sans-serif;font-size:0.62rem;
  letter-spacing:0.4em;text-transform:uppercase;cursor:pointer;
  opacity:0;animation:ef 1.2s ease 2.4s forwards;
  transition:all 0.4s;
}
.ent-btn:hover{background:#C9A84C;color:#000;}
.ent-sub{
  font-size:0.5rem;letter-spacing:0.3em;text-transform:uppercase;
  color:rgba(255,255,255,0.18);margin-top:20px;
  opacity:0;animation:ef 1.2s ease 2.8s forwards;
}
@keyframes ef{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}

/* PASSWORD MODAL */
#pw-modal{
  display:none;position:fixed;inset:0;background:rgba(0,0,0,0.93);
  z-index:20000;align-items:center;justify-content:center;
}
#pw-modal.show{display:flex;}
.pw-box{border:1px solid var(--gold-dim);padding:48px 36px;text-align:center;background:var(--card);max-width:300px;width:90%;}
.pw-title{font-family:'Cormorant Garamond',serif;font-size:1.6rem;color:var(--gold);margin-bottom:6px;}
.pw-sub{font-size:0.52rem;letter-spacing:0.28em;color:rgba(255,255,255,0.28);text-transform:uppercase;margin-bottom:24px;}
.pw-input{width:100%;background:#000;border:1px solid var(--border);color:#fff;font-family:'Montserrat',sans-serif;font-size:0.9rem;padding:12px 14px;outline:none;text-align:center;letter-spacing:0.2em;margin-bottom:14px;display:block;}
.pw-input:focus{border-color:var(--gold);}
.pw-go{width:100%;padding:12px;background:var(--gold);border:none;color:#000;font-family:'Montserrat',sans-serif;font-size:0.55rem;letter-spacing:0.28em;text-transform:uppercase;cursor:pointer;font-weight:600;margin-bottom:10px;display:block;}
.pw-cancel{width:100%;padding:10px;background:transparent;border:1px solid var(--border);color:rgba(255,255,255,0.3);font-family:'Montserrat',sans-serif;font-size:0.52rem;letter-spacing:0.2em;text-transform:uppercase;cursor:pointer;display:block;}
.pw-err{font-size:0.52rem;color:var(--red);margin-top:10px;display:none;letter-spacing:0.15em;}

/* EDIT TOGGLE */
#edit-toggle{
  display:none;position:fixed;bottom:24px;right:24px;z-index:10000;
  background:var(--red);color:#fff;border:none;padding:13px 22px;
  font-family:'Montserrat',sans-serif;font-size:0.56rem;letter-spacing:0.28em;
  text-transform:uppercase;cursor:pointer;font-weight:600;
}
#secret-tap{position:fixed;bottom:0;right:0;width:44px;height:44px;z-index:10000;}
.edit-bar{
  display:none;position:fixed;top:0;left:0;right:0;z-index:9998;
  background:rgba(201,168,76,0.1);border-bottom:1px solid var(--gold-dim);
  padding:7px;text-align:center;font-size:0.5rem;letter-spacing:0.26em;
  color:var(--gold);text-transform:uppercase;
}
body.editing .edit-bar{display:block;}
body.editing nav{top:30px;}
body.editing [contenteditable="true"]{outline:1px dashed rgba(201,168,76,0.4);cursor:text;padding:2px 4px;min-height:1em;}
body.editing [contenteditable="true"]:focus{outline:1px solid var(--gold);background:rgba(201,168,76,0.06);}

/* NAV */
nav{position:fixed;top:0;left:0;right:0;z-index:1000;padding:18px 40px;display:flex;justify-content:space-between;align-items:center;background:linear-gradient(to bottom,rgba(0,0,0,0.92),transparent);transition:top 0.3s;}
.nav-logo{font-family:'Cormorant Garamond',serif;font-size:1.15rem;font-weight:300;letter-spacing:0.4em;color:var(--gold);text-transform:uppercase;text-decoration:none;}
.nav-links{display:flex;gap:26px;list-style:none;}
.nav-links a{font-size:0.58rem;letter-spacing:0.2em;text-transform:uppercase;color:rgba(255,255,255,0.42);text-decoration:none;transition:color 0.3s;}
.nav-links a:hover{color:var(--gold);}

/* HERO */
#hero{height:100vh;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;position:relative;overflow:hidden;padding:20px;}
.hbg{position:absolute;inset:0;background:radial-gradient(ellipse at 15% 50%,rgba(201,168,76,0.08) 0%,transparent 55%),radial-gradient(ellipse at 85% 20%,rgba(201,168,76,0.06) 0%,transparent 50%),#000;}
.vline{position:absolute;left:50%;transform:translateX(-50%);width:1px;animation:vl 2s ease forwards;}
.vline.t{top:0;height:100px;background:linear-gradient(to bottom,transparent,var(--gold-dim));}
.vline.b{bottom:0;height:100px;background:linear-gradient(to top,transparent,var(--gold-dim));}
@keyframes vl{from{opacity:0;transform:translateX(-50%) scaleY(0)}to{opacity:1;transform:translateX(-50%) scaleY(1)}}
.h-eye{font-size:0.58rem;letter-spacing:0.52em;text-transform:uppercase;color:var(--gold);margin-bottom:26px;opacity:0;animation:fu 1s ease 0.3s forwards;}
.h-title{font-family:'Cormorant Garamond',serif;font-size:clamp(4.5rem,13vw,10rem);font-weight:300;line-height:0.88;letter-spacing:0.05em;color:#fff;opacity:0;animation:fu 1s ease 0.6s forwards;}
.h-title span{color:var(--gold);font-style:italic;}
.h-sig{font-family:'Dancing Script',cursive;font-size:clamp(1.3rem,4vw,2.1rem);color:var(--gold-light);margin-top:16px;opacity:0;animation:fu 1s ease 0.9s forwards;}
.h-rule{width:54px;height:1px;background:var(--gold);margin:28px auto;opacity:0;animation:fu 1s ease 1.1s forwards;}
.h-tag{font-size:0.66rem;letter-spacing:0.36em;text-transform:uppercase;color:rgba(255,255,255,0.34);opacity:0;animation:fu 1s ease 1.3s forwards;}
.h-cta{margin-top:48px;opacity:0;animation:fu 1s ease 1.5s forwards;display:flex;gap:16px;flex-wrap:wrap;justify-content:center;}
@keyframes fu{from{opacity:0;transform:translateY(26px)}to{opacity:1;transform:translateY(0)}}

/* BUTTONS */
.btn-gold{padding:13px 36px;border:1px solid var(--gold);color:#000;background:var(--gold);font-family:'Montserrat',sans-serif;font-size:0.58rem;letter-spacing:0.28em;text-transform:uppercase;text-decoration:none;transition:all 0.3s;cursor:pointer;display:inline-block;font-weight:500;}
.btn-gold:hover{background:transparent;color:var(--gold);}
.btn-out{padding:13px 36px;border:1px solid rgba(201,168,76,0.3);color:rgba(255,255,255,0.52);background:transparent;font-family:'Montserrat',sans-serif;font-size:0.58rem;letter-spacing:0.28em;text-transform:uppercase;text-decoration:none;transition:all 0.3s;cursor:pointer;display:inline-block;}
.btn-out:hover{border-color:var(--gold);color:var(--gold);}

/* LAYOUT */
.wrap{padding:96px 40px;max-width:1200px;margin:0 auto;}
.wrap-wide{padding:96px 40px;max-width:1400px;margin:0 auto;}
.dark{background:var(--dark);}
.divider{width:100%;height:1px;background:linear-gradient(to right,transparent,var(--gold-dim),transparent);}
.label{font-size:0.5rem;letter-spacing:0.5em;text-transform:uppercase;color:var(--gold);margin-bottom:13px;display:block;}
.title{font-family:'Cormorant Garamond',serif;font-size:clamp(2.2rem,5.5vw,4rem);font-weight:300;line-height:1.1;color:#fff;margin-bottom:18px;}
.title em{color:var(--gold);font-style:italic;}
.gold-line{width:38px;height:1px;background:var(--gold);margin-bottom:34px;}
.center{text-align:center;}
.center .gold-line{margin-left:auto;margin-right:auto;}
.rv{opacity:0;transform:translateY(30px);transition:opacity 0.8s ease,transform 0.8s ease;}
.rv.on{opacity:1;transform:translateY(0);}
.d1{transition-delay:.1s}.d2{transition-delay:.2s}.d3{transition-delay:.3s}.d4{transition-delay:.4s}.d5{transition-delay:.5s}

/* ABOUT */
.about-grid{display:grid;grid-template-columns:1fr 1fr;gap:76px;align-items:center;}
.about-text p{font-size:0.82rem;line-height:2.1;color:rgba(255,255,255,0.56);margin-bottom:16px;font-weight:300;}
.about-text p strong{color:var(--gold);font-weight:500;}
.about-text p em{color:var(--gold-light);font-style:italic;}
.stats{display:grid;grid-template-columns:1fr 1fr;gap:22px;}
.stat{border:1px solid var(--border);padding:28px 16px;text-align:center;position:relative;overflow:hidden;transition:border-color 0.3s;}
.stat::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:var(--gold);transform:scaleX(0);transition:transform 0.4s;}
.stat:hover::before{transform:scaleX(1);}
.stat-num{font-family:'Cormorant Garamond',serif;font-size:2.5rem;font-weight:300;color:var(--gold);display:block;}
.stat-lbl{font-size:0.52rem;letter-spacing:0.2em;text-transform:uppercase;color:rgba(255,255,255,0.32);margin-top:5px;display:block;}

/* GALLERY */
.gallery-intro{max-width:540px;font-size:0.76rem;line-height:1.9;color:rgba(255,255,255,0.42);font-weight:300;margin-bottom:44px;}
.pieces{display:grid;grid-template-columns:repeat(3,1fr);gap:3px;}

/* PIECE CARD */
.piece{position:relative;background:var(--card);border:1px solid var(--border);transition:border-color 0.3s;display:flex;flex-direction:column;}
.piece:hover{border-color:rgba(201,168,76,0.28);}
.piece-img{position:relative;aspect-ratio:3/4;overflow:hidden;background:#000;}
.piece-img img{width:100%;height:100%;object-fit:cover;display:block;transition:transform 0.5s;}
.piece:hover .piece-img img{transform:scale(1.04);}
.piece-empty{width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;}
.piece-empty-sym{font-family:'Cormorant Garamond',serif;font-size:3rem;color:var(--gold-dim);opacity:0.28;}
.piece-empty-txt{font-size:0.48rem;letter-spacing:0.3em;color:var(--gold-dim);opacity:0.4;text-transform:uppercase;}
.upload-ov{position:absolute;inset:0;background:rgba(0,0,0,0.76);display:none;flex-direction:column;align-items:center;justify-content:center;gap:8px;z-index:5;}
.upload-ov .u-icon{font-size:2rem;}
.upload-ov .u-text{font-size:0.52rem;letter-spacing:0.2em;color:var(--gold);text-transform:uppercase;text-align:center;padding:0 14px;}
body.editing .piece-img{cursor:pointer;}
body.editing .piece-img:hover .upload-ov{display:flex;}
.piece-info{padding:20px 18px 16px;display:flex;flex-direction:column;flex:1;}
.piece-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:9px;}
.piece-id{font-size:0.46rem;letter-spacing:0.32em;color:var(--gold-dim);text-transform:uppercase;}
.badge{font-size:0.42rem;letter-spacing:0.2em;text-transform:uppercase;padding:3px 8px;border:1px solid;}
.badge-av{color:var(--gold);border-color:var(--gold);}
.badge-sold{color:rgba(255,255,255,0.28);border-color:rgba(255,255,255,0.16);}
.badge-arch{color:var(--green);border-color:var(--green);}
.piece-title{font-family:'Cormorant Garamond',serif;font-size:1.2rem;font-weight:400;color:#fff;font-style:italic;margin-bottom:8px;line-height:1.2;}
.piece-desc{font-size:0.66rem;line-height:1.8;color:rgba(255,255,255,0.38);font-weight:300;margin-bottom:14px;flex:1;}
.piece-meta{display:flex;gap:18px;margin-bottom:16px;flex-wrap:wrap;}
.meta-item{display:flex;flex-direction:column;gap:2px;}
.meta-label{font-size:0.44rem;letter-spacing:0.26em;text-transform:uppercase;color:rgba(255,255,255,0.22);}
.meta-value{font-size:0.68rem;color:var(--gold);}
.piece-btn{width:100%;padding:11px;background:transparent;border:1px solid var(--gold-dim);color:var(--gold);font-family:'Montserrat',sans-serif;font-size:0.5rem;letter-spacing:0.26em;text-transform:uppercase;cursor:pointer;transition:all 0.3s;}
.piece-btn:hover{background:var(--gold);color:#000;}
.piece-controls{display:none;padding:12px 18px;background:rgba(201,168,76,0.04);border-top:1px solid var(--border);gap:6px;flex-wrap:wrap;align-items:center;}
body.editing .piece-controls{display:flex;}
.ctrl-select,.ctrl-input{background:#000;border:1px solid var(--border);color:#fff;font-family:'Montserrat',sans-serif;font-size:0.55rem;padding:6px 9px;letter-spacing:0.07em;outline:none;flex:1;min-width:60px;}
.ctrl-select option{background:var(--card);}
.ctrl-del{background:var(--red);border:none;color:#fff;padding:6px 11px;font-size:0.5rem;letter-spacing:0.14em;text-transform:uppercase;cursor:pointer;font-family:'Montserrat',sans-serif;white-space:nowrap;flex-shrink:0;}
.add-wrap{text-align:center;margin-top:32px;}
.add-btn{display:none;padding:12px 32px;border:1px dashed var(--gold-dim);background:transparent;color:var(--gold);font-family:'Montserrat',sans-serif;font-size:0.56rem;letter-spacing:0.26em;text-transform:uppercase;cursor:pointer;transition:all 0.3s;}
.add-btn:hover{border-color:var(--gold);background:rgba(201,168,76,0.04);}
body.editing .add-btn{display:inline-block;}

/* EXPERIENCE */
.exp-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:2px;margin-top:52px;}
.exp-card{padding:44px 30px;border:1px solid var(--border);position:relative;overflow:hidden;background:#000;}
.exp-card::after{content:'';position:absolute;bottom:0;left:0;right:0;height:2px;background:var(--gold);transform:scaleX(0);transition:transform 0.4s;}
.exp-card:hover::after{transform:scaleX(1);}
.exp-num{font-family:'Cormorant Garamond',serif;font-size:3.8rem;font-weight:300;color:var(--gold);opacity:0.1;line-height:1;margin-bottom:16px;}
.exp-title{font-family:'Cormorant Garamond',serif;font-size:1.25rem;color:#fff;margin-bottom:11px;}
.exp-text{font-size:0.68rem;line-height:1.9;color:rgba(255,255,255,0.38);font-weight:300;}

/* PACKAGE */
.pkg-grid{display:grid;grid-template-columns:1fr 1fr;gap:56px;align-items:start;margin-top:52px;}
.pkg-list{list-style:none;display:flex;flex-direction:column;}
.pkg-list li{padding:18px 0;border-bottom:1px solid var(--border);display:flex;align-items:flex-start;gap:14px;}
.pkg-list li:last-child{border-bottom:none;}
.pkg-icon{width:26px;height:26px;border:1px solid var(--gold-dim);display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:2px;font-family:'Cormorant Garamond',serif;color:var(--gold);font-size:0.78rem;}
.pkg-item-title{font-size:0.65rem;letter-spacing:0.11em;text-transform:uppercase;color:#fff;margin-bottom:3px;font-weight:500;}
.pkg-item-text{font-size:0.66rem;line-height:1.8;color:rgba(255,255,255,0.34);font-weight:300;}
.pkg-card{border:1px solid var(--gold-dim);padding:44px 28px;text-align:center;position:sticky;top:120px;}
.pkg-card-label{font-size:0.44rem;letter-spacing:0.38em;color:var(--gold);text-transform:uppercase;margin-bottom:16px;display:block;}
.pkg-logo{font-family:'Cormorant Garamond',serif;font-size:2.5rem;font-weight:300;color:var(--gold);letter-spacing:0.1em;}
.pkg-sub{font-size:0.48rem;letter-spacing:0.36em;color:rgba(255,255,255,0.24);text-transform:uppercase;margin-top:3px;margin-bottom:22px;}
.pkg-divider{width:34px;height:1px;background:var(--gold-dim);margin:18px auto;}
.pkg-items{display:flex;flex-direction:column;gap:9px;text-align:left;margin-top:20px;}
.pkg-item{display:flex;align-items:center;gap:9px;font-size:0.6rem;letter-spacing:0.06em;color:rgba(255,255,255,0.4);}
.pkg-item::before{content:'*';color:var(--gold);font-size:0.6rem;flex-shrink:0;}
.pkg-sig{font-family:'Dancing Script',cursive;color:var(--gold);font-size:1.25rem;margin-top:16px;}

/* ARCHIVE */
.archive-box{border:1px solid var(--gold-dim);padding:64px;text-align:center;position:relative;margin-top:48px;background:linear-gradient(135deg,rgba(201,168,76,0.04) 0%,transparent 100%);}
.archive-box::before{content:'';position:absolute;top:-9px;left:50%;transform:translateX(-50%);background:var(--dark);padding:0 14px;color:var(--gold);font-size:0.68rem;}
.archive-title{font-family:'Cormorant Garamond',serif;font-size:clamp(1.7rem,3.8vw,2.8rem);font-weight:300;color:#fff;font-style:italic;margin-bottom:16px;}
.archive-text{font-size:0.74rem;line-height:2;color:rgba(255,255,255,0.38);max-width:540px;margin:0 auto 28px;font-weight:300;}
.archive-badge{display:inline-flex;align-items:center;gap:9px;border:1px solid var(--green);padding:10px 24px;color:var(--green);font-size:0.5rem;letter-spacing:0.26em;text-transform:uppercase;}

/* CONTACT */
.contact-links{display:flex;justify-content:center;gap:28px;flex-wrap:wrap;margin-bottom:56px;}
.contact-link{display:flex;flex-direction:column;align-items:center;gap:9px;text-decoration:none;transition:all 0.3s;}
.contact-icon{width:50px;height:50px;border:1px solid var(--gold-dim);display:flex;align-items:center;justify-content:center;transition:all 0.3s;font-size:1.05rem;}
.contact-link:hover .contact-icon{border-color:var(--gold);background:rgba(201,168,76,0.1);}
.contact-label{font-size:0.48rem;letter-spacing:0.24em;text-transform:uppercase;color:rgba(255,255,255,0.32);}
.contact-link:hover .contact-label{color:var(--gold);}
.registry-box{border:1px solid var(--gold-dim);padding:44px 56px;max-width:620px;margin:0 auto 56px;position:relative;}
.registry-box::before{content:"COLLECTOR'S REGISTRY";position:absolute;top:-8px;left:50%;transform:translateX(-50%);background:#000;padding:0 14px;font-size:0.44rem;letter-spacing:0.36em;color:var(--gold);}
.registry-box p{font-size:0.72rem;line-height:1.9;color:rgba(255,255,255,0.38);font-weight:300;margin-bottom:22px;}

/* FOOTER */
footer{border-top:1px solid var(--border);padding:28px 40px;max-width:1200px;margin:0 auto;display:flex;justify-content:space-between;align-items:center;}
.footer-logo{font-family:'Cormorant Garamond',serif;font-size:0.95rem;font-weight:300;letter-spacing:0.3em;color:var(--gold);}
.footer-sig{font-family:'Dancing Script',cursive;color:var(--gold-dim);font-size:0.9rem;}
.footer-copy{font-size:0.46rem;letter-spacing:0.16em;color:rgba(255,255,255,0.14);text-transform:uppercase;}

/* MOBILE */
@media(max-width:960px){
  .pieces{grid-template-columns:repeat(2,1fr);}
  .exp-grid{grid-template-columns:1fr 1fr;}
  .about-grid{grid-template-columns:1fr;gap:40px;}
  .pkg-grid{grid-template-columns:1fr;}
  .pkg-card{position:static;}
}
@media(max-width:600px){
  nav{padding:13px 16px;}
  .nav-links{display:none;}
  .wrap,.wrap-wide{padding:60px 16px;}
  .pieces{grid-template-columns:1fr;}
  .exp-grid{grid-template-columns:1fr;}
  .archive-box{padding:32px 18px;}
  .registry-box{padding:32px 18px;}
  .h-cta{flex-direction:column;align-items:center;}
  footer{flex-direction:column;gap:10px;text-align:center;}
  #edit-toggle{bottom:14px;right:14px;padding:10px 16px;}
}
</style>
</head>
<body>

<!-- ENTRANCE -->
<div id="entrance">
  <canvas id="ent-canvas"><
