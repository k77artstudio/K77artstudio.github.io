<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>K77 Art Studio</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  background: #000;
  color: white;
  font-family: Arial, sans-serif;
  text-align: center;
}

/* CONTAINER */
.container {
  padding: 70px 20px;
}

/* LOGO */
.logo {
  width: 140px;
  margin-bottom: 30px;
}

/* TITLE */
h1 {
  font-family: 'Playfair Display', serif;
  font-size: 34px;
  margin-bottom: 10px;
}

/* SIGNATURE */
.signature {
  color: #d4af37;
  font-size: 18px;
  margin-bottom: 30px;
  letter-spacing: 1.5px;
}

/* DESCRIPTION */
.desc {
  max-width: 550px;
  margin: 0 auto 60px;
  line-height: 1.8;
  opacity: 0.85;
  font-size: 15px;
}

/* ART FRAME (FIXED VERSION) */
.art {
  width: 70%;
  max-width: 380px;
  padding: 12px; /* inner breathing space */
  background: #0a0a0a;
  border: 6px solid #111;
  outline: 1px solid #d4af37;
  box-shadow: 0 20px 60px rgba(0,0,0,0.9);
  margin: 50px auto 70px;
  display: block;
  border-radius: 4px;
}

/* BUTTON */
.btn {
  display: inline-block;
  padding: 14px 30px;
  background: #d4af37;
  color: black;
  text-decoration: none;
  border-radius: 4px;
  font-weight: bold;
  margin-top: 10px;
}

/* FOOTER */
.footer {
  margin-top: 90px;
  font-size: 13px;
  opacity: 0.5;
}
</style>
</head>

<body>

<div class="container">

  <!-- LOGO -->
  <img src="https://files.catbox.moe/sqylip.png" class="logo">

  <!-- BRAND -->
  <h1>K77 Art Studio</h1>
  <p class="signature">Signature Living Frame</p>

  <!-- DESCRIPTION -->
  <p class="desc">
    Where Tattoo, Technology and Art converge into a living experience.
    Each piece is crafted to hold identity, memory and presence beyond the frame.
  </p>

  <!-- ARTWORK -->
  <img src="<a href="https://ibb.co/ZRk2zXgw"><img src="https://i.ibb.co/CpTPK89X/IMG-20260404-WA0030.jpg" alt="IMG-20260404-WA0030" border="0"></a>

" class="art">

  <!-- BUTTON -->
  <a href="collection.html" class="btn">
    View Collection
  </a>

  <!-- FOOTER -->
  <div class="footer">
    © 2026 K77 Art Studio
  </div>

</div>

</body>
</html>
