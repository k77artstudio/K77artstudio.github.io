<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>K77 Art Studio</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: black;
    color: white;
}

/* SLIDER */
.slider {
    position: relative;
    height: 100vh;
    overflow: hidden;
}

.slide {
    position: absolute;
    width: 100%;
    height: 100%;
    background-size: cover;
    background-position: center;
    opacity: 0;
    transition: 1s;
}

.slide.active {
    opacity: 1;
}

/* OVERLAY */
.overlay {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
}

h1 {
    color: gold;
    font-size: 40px;
}

p {
    font-size: 18px;
}

.btn {
    margin-top: 20px;
    padding: 12px 25px;
    background: gold;
    color: black;
    text-decoration: none;
    display: inline-block;
}
</style>
</head>

<body>

<div class="slider">
    <div class="slide active" style="background-image:url('<a href="https://ibb.co/ZRk2zXgw"><img src="https://i.ibb.co/CpTPK89X/IMG-20260404-WA0030.jpg" alt="IMG-20260404-WA0030" border="0"></a>
1')"></div>
    <div class="slide" style="background-image:url('<a href="https://ibb.co/pv6LST5V"><img src="https://i.ibb.co/99mr70SK/IMG-20260404-WA0028.jpg" alt="IMG 20260404 WA0028" border="0"></a>
2')"></div>
    <div class="slide" style="background-image:url('<a href="https://ibb.co/cSKX1Pnh"><img src="https://i.ibb.co/0RpVckby/IMG-20260404-WA0033.jpg" alt="IMG-20260404-WA0033" border="0"></a><br /><a target='_blank' href='https://imgbb.com/'>image hosting with embed generator</a><br />
3')"></div>

    <div class="overlay">
        <h1>K77 Art Studio</h1>
        <p>Signature Living Frame</p>
        <a href="collection.html" class="btn">View Collection</a>
    </div>
</div>

<script>
let slides = document.querySelectorAll('.slide');
let index = 0;

setInterval(() => {
    slides[index].classList.remove('active');
    index = (index + 1) % slides.length;
    slides[index].classList.add('active');
}, 3000);
</script>

</body>
</html>
