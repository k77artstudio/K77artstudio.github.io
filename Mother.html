<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

/* BACKGROUND */
body {
  background-color: #000;
  color: #fff;
  font-family: Arial, sans-serif;
  margin: 0;
}

/* CONTAINER */
.container {
  width: 100%;
  padding: 40px 20px;
  box-sizing: border-box;
}

/* LOGO */
.logo {
  display: block;
  margin: 0 auto 35px;
  width: 180px;
}

/* TITLE */
h1 {
  margin-bottom: 30px;
  font-size: 26px;
  text-align: center;
  color: #d4af37;
}

/* SUBTEXT */
.highlight {
  margin-bottom: 30px;
  text-align: center;
  font-size: 18px;
  color: #ccc;
}

/* AUDIO */
audio {
  width: 100%;
  margin: 30px 0;
  filter: invert(1);
}

/* ARTWORK */
.art-frame {
  width: 100%;
  margin: 35px 0;
  border: 3px solid #d4af37;
  padding: 6px;
  background-color: #000;
}

/* GRATITUDE */
.gratitude {
  margin-top: 40px;
  font-size: 18px;
  line-height: 1.8;
  text-align: center;
}

</style>
</head>

<body>
<div class="container">

  <!-- LOGO -->
  <img src="https://i.ibb.co/Y4rLx9Bd/file-00000000abc8724383d4b280ca6a7247.jpg" class="logo">

  <!-- TITLE -->
  <h1>
    Every piece carries a story.
Created for a few.
One of five,
.<br>
 Owned by Kindred   — 2026 🌹
  </h1>

  <!-- SUBTEXT -->
  <p class="highlight">
    This piece speaks. Listen.
  </p>

  <!-- AUDIO -->
  <audio controls>
    <source src="https://files.catbox.moe/mr9c5r.mp3" type="audio/mpeg">
  </audio>

  <!-- ARTWORK -->
  <img src="https://files.catbox.moe/2ssho2.jpg" class="art-frame">

  <!-- GRATITUDE -->
  <p class="gratitude">
    Thank you for being part of this story.<br>
    I’m because you are.<br><br>
    — Kindred Spirit
  </p>

  <!-- CONNECT -->
  <p style="text-align:center; margin-top:25px; opacity:0.7;">
    Connect
  </p>

  <div style="text-align:center; margin-top:15px;">

    <!-- INSTAGRAM -->
    <a href="https://www.instagram.com/k77.artstudio?igsh=MXhmMG9heWo3aWc1MA==" target="_blank" style="margin:0 15px;">
      <img src="https://cdn-icons-png.flaticon.com/512/2111/2111463.png" width="28">
    </a>

    <!-- WHATSAPP (FINAL FIXED MESSAGE) -->
    <a href="https://wa.me/2349014501664?text=Hi%20Kindred%2C%20I%20just%20scanned%20your%20artwork.%20I%20am%20interested." target="_blank" style="margin:0 15px;">
      <img src="https://cdn-icons-png.flaticon.com/512/733/733585.png" width="28">
    </a>

  </div>

</div>
</body>
</html>
