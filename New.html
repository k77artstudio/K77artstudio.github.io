<!DOCTYPE html>
<html>
<head>
<style>

/* BACKGROUND */
body {
  background-color: #000;
  color: #fff;
  font-family: Arial, sans-serif;
  margin: 0;
}

/* CONTAINER (THIS IS THE CORRECT BALANCE) */
.container {
  width: 100%;
  max-width: 600px;
  margin: auto;
  padding: 30px 20px;
}

/* LOGO */
.logo {
  display: block;
  margin: 0 auto 30px;
  width: 130px;
}

/* TITLE */
h1 {
  margin-bottom: 25px;
  font-size: 22px;
  text-align: center;
  color: #d4af37;
}

/* SUBTEXT */
.highlight {
  margin-bottom: 25px;
  text-align: center;
  font-size: 16px;
  color: #ccc;
}

/* AUDIO */
audio {
  width: 100%;
  margin: 25px 0;
  filter: invert(1);
}

/* ARTWORK (FOCUS BUT NOT TOO HEAVY) */
.art-frame {
  width: 100%;
  margin: 30px 0;
  border: 3px solid #d4af37;
  padding: 5px;
  background-color: #000;
}

/* GRATITUDE */
.gratitude {
  margin-top: 35px;
  font-size: 16px;
  line-height: 1.7;
  text-align: center;
  opacity: 0.9;
}

/* INSTAGRAM */
.ig-link {
  display: block;
  text-align: center;
  margin-top: 20px;
  font-size: 14px;
  color: #d4af37;
  text-decoration: none;
}

/* WHATSAPP TEXT */
.whatsapp {
  text-align: center;
  margin-top: 12px;
  font-size: 16px;
  font-weight: bold;
}

</style>
</head>

<body>
<div class="container">

  <!-- LOGO -->
  <img src="https://files.catbox.moe/sqylip.png" class="logo">

  <!-- TITLE -->
  <h1>
    Every piece carries a story, this one is yours.<br>
    Victor — 2026 🌹
  </h1>

  <!-- SUBTEXT -->
  <p class="highlight">
    This piece speaks. Listen.
  </p>

  <!-- AUDIO -->
  <audio controls>
    <source src="https://files.catbox.moe/wwc3eu.mp3" type="audio/mpeg">
  </audio>

  <!-- ARTWORK -->
  <img src="https://files.catbox.moe/orbh8s.png" class="art-frame">

  <!-- GRATITUDE -->
  <p class="gratitude">
    Thank you for being part of this story.<br>
    I’m because you are.<br><br>
    — Kindred Spirit
  </p>

  <!-- INSTAGRAM -->
  <a href="PASTE-INSTAGRAM-LINK-HERE" target="_blank" class="ig-link">
    Contact us on Instagram
  </a>

  <!-- WHATSAPP -->
  <p class="whatsapp">
    WhatsApp: 09014501664
  </p>

</div>
</body>
</html>
