<!DOCTYPE html>
<html>
<head>
<style>

/* BACKGROUND */
body {
  background-color: #000;
  color: #fff;
  font-family: Arial, sans-serif;
}

/* CONTAINER */
.container {
  max-width: 500px;
  margin: auto;
  padding: 25px 20px;
}

/* LOGO */
.logo {
  display: block;
  margin: 0 auto 25px;
  width: 120px;
}

/* TITLE */
h1 {
  margin-bottom: 20px;
  font-size: 20px;
  text-align: center;
  color: #d4af37;
}

/* SUBTEXT */
.highlight {
  margin-bottom: 20px;
  text-align: center;
  color: #ccc;
}

/* AUDIO */
audio {
  width: 100%;
  margin: 20px 0;
  filter: invert(1);
}

/* ARTWORK (GOLD FRAME) */
.art-frame {
  width: 100%;
  margin: 25px 0;
  border: 3px solid #d4af37;
  padding: 5px;
  background-color: #000;
}

/* GRATITUDE */
.gratitude {
  margin-top: 30px;
  font-size: 16px;
  opacity: 0.8;
  line-height: 1.6;
  text-align: center;
}

/* INSTAGRAM LINK */
.ig-link {
  display: block;
  text-align: center;
  margin-top: 15px;
  font-size: 13px;
  color: #d4af37;
  text-decoration: none;
  opacity: 0.85;
}

</style>
</head>

<body>
<div class="container">

  <!-- LOGO -->
  <img src="https://files.catbox.moe/sqylip.png" class="logo">

  <!-- TITLE -->
  <h1>
    Every piece carries a story, this one is yours.<br>
    Victor — 2026 🌹
  </h1>

  <!-- SUBTEXT -->
  <p class="highlight">
    This piece speaks. Listen.
  </p>

  <!-- AUDIO -->
  <audio controls>
    <source src="https://files.catbox.moe/wwc3eu.mp3" type="audio/mpeg">
  </audio>

  <!-- ARTWORK -->
  <img src="https://files.catbox.moe/orbh8s.png" class="art-frame">

  <!-- GRATITUDE -->
  <p class="gratitude">
    Thank you for being part of this story.<br>
    I’m because you are.<br><br>
    — Kindred Spirit
  </p>

  <!-- INSTAGRAM LINK -->
  <a href="PASTE-LINK-HERE" target="_blank" class="ig-link">
    Contact us on Instagram
  </a>

</div>
</body>
</html>
