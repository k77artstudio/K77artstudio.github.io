<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Special Message</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&display=swap" rel="stylesheet">

<style>
  body {
    margin: 0;
    padding: 0;
    background: linear-gradient(to bottom, #000000, #0a0a0a, #111111);
    color: white;
    font-family: Arial, sans-serif;
    text-align: center;
  }

  .container {
    padding: 40px 20px;
  }

  .logo {
    width: 200px;
    margin-bottom: 25px;
  }

  h1 {
    font-family: 'Playfair Display', serif;
    font-size: 28px;
    margin-bottom: 20px;
  }

  audio {
    margin-top: 20px;
    width: 90%;
  }

  video {
    margin-top: 30px;
    width: 90%;
    border-radius: 10px;
  }

  .gratitude {
    margin-top: 40px;
    font-size: 16px;
    opacity: 0.8;
    line-height: 1.6;
  }

</style>
</head>

<body>

<div class="container">

  <!-- LOGO -->
  <img src="https://files.catbox.moe/sqylip.png
" class="logo">

  <!-- TITLE -->
  <h1>This piece was specially made for you,<br>OBENBE 🌸</h1>

  <!-- AUDIO -->
  <audio controls>
    <source src="https://files.catbox.moe/wwc3eu.mp3
" type="audio/mpeg">
  </audio>

  <!-- VIDEO (AUTO PLAY - NO SOUND) -->
  <video autoplay muted loop playsinline>
    <source src="https://files.catbox.moe/2vzzpz.mp4
" type="video/mp4">
  </video>

  <!-- GRATITUDE -->
  <p class="gratitude">
    Thanks for your patronage.<br>
    I’m because you are.<br><br>
    Yours,<br>
    Kindred Spirit
  </p>

</div>

</body>
</html>
